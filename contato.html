<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Fale Comigo - Guilherme Martins</title>
</head>
<body style="font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; line-height: 1.6;">

    <h2 style="color: #2c3e50; border-bottom: 2px solid #2c3e50;">Fale Comigo</h2>
    <p>Preencha os dados abaixo para entrar em contato.</p>

    <form action="sucesso.html" style="background: #f9f9f9; padding: 20px; border-radius: 8px;">
        
        <label for="nome"><strong>Nome:</strong></label><br>
        <input type="text" id="nome" name="nome" required style="width: 100%;"><br><br>

        <label for="email"><strong>E-mail:</strong></label><br>
        <input type="email" id="email" name="email" required style="width: 100%;"><br><br>

        <label for="assunto"><strong>Assunto:</strong></label><br>
        <input type="text" id="assunto" name="assunto" required style="width: 100%;"><br><br>

        <label for="mensagem"><strong>Mensagem:</strong></label><br>
        <textarea id="mensagem" name="mensagem" required style="width: 100%; height: 100px;"></textarea><br><br>

        <hr>
        <p><em>Informações adicionais:</em></p>

        <label for="tel">Telefone:</label><br>
        <input type="tel" id="tel" name="tel"><br><br>

        <label for="data">Data de preferência:</label><br>
        <input type="date" id="data" name="data"><br><br>

        <label for="origem">Como me conheceu?</label><br>
        <select id="origem" name="origem">
            <option value="linkedin">LinkedIn</option>
            <option value="faculdade">Faculdade</option>
            <option value="outros">Outros</option>
        </select><br><br>

        <button type="reset" style="padding: 10px 20px; cursor: pointer;">Limpar</button>
        <button type="submit" style="padding: 10px 20px; cursor: pointer; background-color: #2c3e50; color: white; border: none; border-radius: 4px;">Enviar Mensagem</button>
    </form>

    <br>
    <a href="index.html" style="text-decoration: none; color: #3498db;">← Voltar para a página inicial</a>

</body>
</html>
